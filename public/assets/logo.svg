<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="none" />
  <text x="50%" y="50%" font-family="'Inter', sans-serif" font-size="120" font-weight="900" fill="url(#grad1)" text-anchor="middle" dominant-baseline="central" filter="url(#glow)" style="letter-spacing: 15px; text-transform: uppercase;">
    LIFE
  </text>
  <text x="50%" y="85%" font-family="'Inter', sans-serif" font-size="20" font-weight="300" fill="rgba(255,255,255,0.5)" text-anchor="middle" style="letter-spacing: 12px; text-transform: uppercase;">
    PROJECT • NEOCITY
  </text>
</svg>
